<script type="text/babel">
const {useState, useEffect, useRef} = React;
const OPT = ["A","B","C","D"];

const LS = {
  load(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb}catch{return fb}},
  save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  clearAll(){try{localStorage.removeItem("exam-wrong");localStorage.removeItem("exam-star");localStorage.removeItem("exam-stats")}catch{}}
};

function App() {
  const [view, setView] = useState("home");
  const [examFilter, setExamFilter] = useState("all");
  const [wrongIds, setWrongIds] = useState(()=>LS.load("exam-wrong",[]));
  const [starIds, setStarIds] = useState(()=>LS.load("exam-star",[]));
  const [stats, setStats] = useState(()=>LS.load("exam-stats",{total:0,correct:0,sessions:0}));
  const [showReset, setShowReset] = useState(false);

  useEffect(()=>LS.save("exam-wrong",wrongIds),[wrongIds]);
  useEffect(()=>LS.save("exam-star",starIds),[starIds]);
  useEffect(()=>LS.save("exam-stats",stats),[stats]);

  const toggleStar = id => setStarIds(p => p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const addWrong = id => setWrongIds(p => p.includes(id)?p:[...p,id]);
  const rmWrong = id => setWrongIds(p => p.filter(x=>x!==id));
  const record = (t,c) => setStats(p=>({total:p.total+t,correct:p.correct+c,sessions:p.sessions+1}));

  const clearAllData = () => {
    setWrongIds([]);setStarIds([]);setStats({total:0,correct:0,sessions:0});
    LS.clearAll();setShowReset(false);setView("home");
  };

  const filteredQs = examFilter==="all" ? QUESTIONS : QUESTIONS.filter(q=>q.examId===examFilter);
  const props = {questions:filteredQs,allQuestions:QUESTIONS,wrongIds,starIds,toggleStar,addWrong,rmWrong,record,
    goHome:()=>setView("home"),examFilter,setExamFilter};

  return (
    <div style={{fontFamily:"'Noto Sans TC',sans-serif",maxWidth:560,margin:"0 auto",minHeight:"100vh",background:"#f8f6f3",color:"#2a2520",paddingBottom:40}}>
      {showReset && <div className="modal-overlay" onClick={()=>setShowReset(false)}>
        <div className="modal-box" onClick={e=>e.stopPropagation()}>
          <p className="modal-title">⚠️ 確定要清除所有資料？</p>
          <p className="modal-msg">這將會清除你的錯題紀錄、重要標記、以及所有練習統計數據，此操作無法復原。</p>
          <div className="modal-btns">
            <button className="modal-cancel" onClick={()=>setShowReset(false)}>取消</button>
            <button className="modal-confirm" onClick={clearAllData}>確定清除</button>
          </div>
        </div>
      </div>}
      {view==="home"&&<Home {...props} setView={setView} stats={stats} onReset={()=>setShowReset(true)}/>}
      {view==="practice"&&<Practice {...props}/>}
      {view==="exam"&&<Exam {...props}/>}
      {view==="review"&&<Review {...props}/>}
      {view==="starred"&&<StarredView {...props}/>}
    </div>
  );
}

function Home({setView,stats,wrongIds,starIds,allQuestions,examFilter,setExamFilter,onReset}){
  const rate=stats.total>0?Math.round(stats.correct/stats.total*100):0;
  const modes=[
    {k:"practice",icon:"📖",t:"一般練習",d:"逐題作答・即時詳解",c:"#1a5632",bg:"linear-gradient(145deg,#e8f5e9,#c8e6c9)"},
    {k:"exam",icon:"⏱️",t:"計時考試",d:"模擬正式考試",c:"#b45309",bg:"linear-gradient(145deg,#fff3e0,#ffe0b2)"},
    {k:"review",icon:"🔄",t:"錯題複習",d:`${wrongIds.length} 題待複習`,c:"#7b1fa2",bg:"linear-gradient(145deg,#f3e5f5,#e1bee7)"},
    {k:"starred",icon:"⭐",t:"重要標記",d:`${starIds.length} 題已標記`,c:"#c77c00",bg:"linear-gradient(145deg,#fffde7,#fff9c4)"},
  ];
  return(
    <div>
      <div className="hero"><div className="hero-bg"/>
        <h1 className="hero-title">內外科護理學</h1>
        <p className="hero-sub">護理師考試 · 考古題特訓</p>
        <p className="hero-count">{allQuestions.length} 題收錄 · {EXAMS.length} 回歷屆考題</p>
      </div>
      {stats.total>0&&<div className="stats-row">
        <div className="stat"><b>{stats.total}</b><span>已作答</span></div>
        <div className="stat hl"><b>{rate}%</b><span>正確率</span></div>
        <div className="stat"><b>{stats.sessions}</b><span>練習次</span></div>
      </div>}
      <div style={{padding:"16px 16px 0"}}>
        <label className="filter-label">選擇考試回次</label>
        <select className="filter-select" value={examFilter} onChange={e=>setExamFilter(e.target.value)}>
          <option value="all">全部 ({allQuestions.length} 題)</option>
          {EXAMS.map(ex=>{
            const cnt=allQuestions.filter(q=>q.examId===ex.id).length;
            return <option key={ex.id} value={ex.id}>{ex.name} ({cnt} 題)</option>;
          })}
        </select>
      </div>
      <div className="mode-grid">
        {modes.map((m,i)=>(
          <button key={m.k} className="mode-card" style={{background:m.bg,animationDelay:`${i*.07}s`}} onClick={()=>setView(m.k)}>
            <span style={{fontSize:34}}>{m.icon}</span>
            <span className="mode-title" style={{color:m.c}}>{m.t}</span>
            <span className="mode-desc">{m.d}</span>
          </button>
        ))}
      </div>
      <div style={{textAlign:"center",marginTop:24}}>
        <button className="reset-btn" onClick={onReset}>🗑️ 清除所有學習記錄</button>
      </div>
    </div>
  );
}

function Practice({questions:qs,starIds,toggleStar,addWrong,rmWrong,goHome}){
  const [i,setI]=useState(0);const [sel,setSel]=useState(null);const [show,setShow]=useState(false);
  if(!qs.length) return <Empty title="📖 一般練習" back={goHome}/>;
  const q=qs[Math.min(i,qs.length-1)];
  const pick=o=>{if(sel!==null)return;setSel(o);setShow(true);o!==q.answer?addWrong(q.id):rmWrong(q.id);};
  const go=d=>{setSel(null);setShow(false);setI(p=>Math.max(0,Math.min(qs.length-1,p+d)));};
  return(<div>
    <Hdr title="📖 一般練習" back={goHome}/>
    <Bar cur={i+1} tot={qs.length} color="#1a5632"/>
    <QCard q={q} i={i} tot={qs.length} sel={sel} show={show} star={starIds.includes(q.id)} onSel={pick} onStar={()=>toggleStar(q.id)}/>
    <NavR i={i} tot={qs.length} go={go}/>
  </div>);
}

function Exam({questions:qs,starIds,toggleStar,addWrong,rmWrong,record,goHome}){
  const [phase,setPhase]=useState("setup");const [tl,setTl]=useState(10);
  const [left,setLeft]=useState(0);const [i,setI]=useState(0);const [ans,setAns]=useState({});
  const ref=useRef(null);
  const start=()=>{setPhase("run");setLeft(tl*60);setI(0);setAns({});};
  useEffect(()=>{
    if(phase!=="run")return;
    ref.current=setInterval(()=>setLeft(t=>{if(t<=1){clearInterval(ref.current);setPhase("done");return 0;}return t-1;}),1000);
    return()=>clearInterval(ref.current);
  },[phase]);
  const submit=()=>{clearInterval(ref.current);qs.forEach(q=>ans[q.id]===q.answer?rmWrong(q.id):addWrong(q.id));record(qs.length,qs.filter(q=>ans[q.id]===q.answer).length);setPhase("done");};
  const mm=String(Math.floor(left/60)).padStart(2,"0"),ss=String(left%60).padStart(2,"0");
  if(!qs.length) return <Empty title="⏱️ 計時考試" back={goHome}/>;
  if(phase==="setup") return(<div>
    <Hdr title="⏱️ 計時考試" back={goHome}/>
    <div className="setup-card">
      <p className="setup-label">選擇考試時間（分鐘）</p>
      <div className="time-row">{[5,10,15,20,30].map(t=><button key={t} className={`time-btn ${tl===t?"active":""}`} onClick={()=>setTl(t)}>{t}</button>)}</div>
      <p className="setup-info">共 {qs.length} 題 · {tl} 分鐘</p>
      <button className="big-btn" onClick={start}>開始考試</button>
    </div>
  </div>);
  if(phase==="done"){
    const c=qs.filter(q=>ans[q.id]===q.answer).length;
    return(<div>
      <Hdr title="📊 考試結果" back={goHome}/>
      <div className="result-card">
        <div className="score-big">{Math.round(c/qs.length*100)}<span>%</span></div>
        <p className="score-sub">答對 {c} / {qs.length} 題</p>
        <div className="dot-grid">{qs.map((q,j)=><div key={q.id} className={`dot ${ans[q.id]===q.answer?"ok":"no"}`}>{j+1}</div>)}</div>
        <button className="big-btn" style={{marginTop:20}} onClick={goHome}>返回首頁</button>
      </div>
      <div>{qs.map((q,j)=><QCard key={q.id} q={q} i={j} tot={qs.length} sel={ans[q.id]!=null?ans[q.id]:null} show={true} star={starIds.includes(q.id)} onSel={()=>{}} onStar={()=>toggleStar(q.id)} rev={true}/>)}</div>
    </div>);
  }
  const q=qs[i];
  return(<div>
    <div className="exam-hdr"><button className="back-btn" onClick={goHome}>✕</button><div className={`timer ${left<60?"warn":""}`}>🕐 {mm}:{ss}</div><button className="submit-btn" onClick={submit}>交卷</button></div>
    <Bar cur={Object.keys(ans).length} tot={qs.length} color="#b45309"/>
    <QCard q={q} i={i} tot={qs.length} sel={ans[q.id]!=null?ans[q.id]:null} show={false} star={starIds.includes(q.id)} onSel={o=>setAns(p=>({...p,[q.id]:o}))} onStar={()=>toggleStar(q.id)} exam={true}/>
    <NavR i={i} tot={qs.length} go={d=>setI(p=>Math.max(0,Math.min(qs.length-1,p+d)))}/>
    <div className="jump-row">{qs.map((qq,j)=><button key={qq.id} className={`jump ${ans[qq.id]!=null?"done":""} ${j===i?"cur":""}`} onClick={()=>setI(j)}>{j+1}</button>)}</div>
  </div>);
}

function Review({allQuestions,wrongIds,starIds,toggleStar,rmWrong,goHome}){
  const qs=allQuestions.filter(q=>wrongIds.includes(q.id));
  const [i,setI]=useState(0);const [sel,setSel]=useState(null);const [show,setShow]=useState(false);
  if(!qs.length) return(<div><Hdr title="🔄 錯題複習" back={goHome}/><div className="empty-card"><span style={{fontSize:52}}>🎉</span><p className="empty-t">沒有錯題，太棒了！</p><button className="big-btn" style={{marginTop:20}} onClick={goHome}>返回首頁</button></div></div>);
  const idx=Math.min(i,qs.length-1);const q=qs[idx];
  const pick=o=>{if(sel!==null)return;setSel(o);setShow(true);if(o===q.answer)rmWrong(q.id);};
  const go=d=>{setSel(null);setShow(false);setI(p=>Math.max(0,Math.min(qs.length-1,p+d)));};
  return(<div><Hdr title="🔄 錯題複習" back={goHome}/><Bar cur={idx+1} tot={qs.length} color="#7b1fa2"/>
    <QCard q={q} i={idx} tot={qs.length} sel={sel} show={show} star={starIds.includes(q.id)} onSel={pick} onStar={()=>toggleStar(q.id)}/>
    <NavR i={idx} tot={qs.length} go={go}/></div>);
}

function StarredView({allQuestions,starIds,toggleStar,addWrong,rmWrong,goHome}){
  const qs=allQuestions.filter(q=>starIds.includes(q.id));
  const [i,setI]=useState(0);const [sel,setSel]=useState(null);const [show,setShow]=useState(false);
  if(!qs.length) return(<div><Hdr title="⭐ 重要標記" back={goHome}/><div className="empty-card"><span style={{fontSize:52}}>📌</span><p className="empty-t">尚未標記任何題目</p><p style={{color:"#aaa",fontSize:13,marginTop:4}}>作答時按星號即可標記</p><button className="big-btn" style={{marginTop:20}} onClick={goHome}>返回首頁</button></div></div>);
  const idx=Math.min(i,qs.length-1);const q=qs[idx];
  const pick=o=>{if(sel!==null)return;setSel(o);setShow(true);o!==q.answer?addWrong(q.id):rmWrong(q.id);};
  const go=d=>{setSel(null);setShow(false);setI(p=>Math.max(0,Math.min(qs.length-1,p+d)));};
  return(<div><Hdr title="⭐ 重要標記" back={goHome}/><Bar cur={idx+1} tot={qs.length} color="#c77c00"/>
    <QCard q={q} i={idx} tot={qs.length} sel={sel} show={show} star={true} onSel={pick} onStar={()=>toggleStar(q.id)}/>
    <NavR i={idx} tot={qs.length} go={go}/></div>);
}

function Empty({title,back}){return <div><Hdr title={title} back={back}/><div className="empty-card"><span style={{fontSize:52}}>📭</span><p className="empty-t">此分類目前沒有題目</p><button className="big-btn" style={{marginTop:20}} onClick={back}>返回首頁</button></div></div>;}
function Hdr({title,back}){return <div className="hdr"><button className="back-btn" onClick={back}>← 返回</button><span className="hdr-t">{title}</span><div style={{width:60}}/></div>;}
function Bar({cur,tot,color}){return <div className="bar-outer"><div className="bar-inner" style={{width:`${cur/tot*100}%`,background:color}}/></div>;}
function NavR({i,tot,go}){return <div className="nav-row"><button className="nav-btn" disabled={i===0} onClick={()=>go(-1)}>◀ 上一題</button><span className="nav-ct">{i+1}/{tot}</span><button className="nav-btn" disabled={i===tot-1} onClick={()=>go(1)}>下一題 ▶</button></div>;}

function QCard({q,i,tot,sel,show,star,onSel,onStar,exam,rev}){
  const done=sel!==null;
  return(<div className="card fadeUp">
    <div className="card-top">
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <span className="cat">{q.category}</span>
        <span className="exam-tag">{q.examId}</span>
      </div>
      <button className={`star-btn ${star?"on":""}`} onClick={onStar}>{star?"★":"☆"}</button>
    </div>
    <p className="q-text"><b className="q-num">Q{q.num}.</b> {q.question}</p>
    <div className="opts">{q.options.map((o,j)=>{
      let cls="opt";
      if(done&&!exam){if(j===q.answer)cls+=" correct";else if(j===sel&&j!==q.answer)cls+=" wrong";}
      if(rev){if(j===q.answer)cls+=" correct";else if(j===sel&&j!==q.answer)cls+=" wrong";}
      if(exam&&sel===j)cls+=" picked";
      return(<button key={j} className={cls} onClick={()=>onSel(j)} disabled={done&&!exam}>
        <span className="opt-label">{OPT[j]}</span><span className="opt-text">{o}</span>
        {done&&!exam&&j===q.answer&&<span className="mark ok-mark">✓</span>}
        {done&&!exam&&j===sel&&j!==q.answer&&<span className="mark no-mark">✗</span>}
      </button>);
    })}</div>
    {(show||rev)&&<div className="explain fadeIn">
      {show&&!rev&&<div className="explain-status">{sel===q.answer?<span className="status-ok">✅ 答對了！</span>:<span className="status-no">❌ 答錯了 — 正確答案：{OPT[q.answer]}</span>}</div>}
      <p className="explain-text">{q.explanation}</p>
      {q.reference&&<div className="ref-row"><span>📚</span>{q.refUrl?<a href={q.refUrl} target="_blank" rel="noreferrer" className="ref-link">{q.reference}</a>:<span className="ref-link">{q.reference}</span>}</div>}
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
